services:
  traefik:
    container_name: traefik
    image: traefik:latest
    hostname: traefik
    restart: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./container/letsencrypt/cert:/letsencrypt:rw"
      - "./container/traefik/config/tls.yml:/etc/traefik/tls.yml:ro"
      - "./container/traefik/certs:/certs:ro"
    command:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/tls.yml"
      - "--entrypoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entrypoint.to=websecure"
      - "--entryPoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.radicale.address=:5232"
    ports:
      - 80:80
      - 443:443
      - 5232:5232
    networks:
      - daycare_ext
    logging:
      driver: syslog
      options:
        tag: "traefik"
 
  daycare:
    container_name: daycare
    build: ./container/daycare/build
    hostname: daycare
    restart: unless-stopped
    depends_on:
      radicale:
        condition: service_healthy
      signal-cli-rest-api:
        condition: service_healthy
    environment:
      - TZ=Europe/Berlin
    volumes:
      - "./container/daycare/config:/config:ro"
      - "./container/daycare/data:/data"
      - "./container/traefik/certs/cert.pem:/certs/ca.pem:ro"
    secrets:
      - radicale_password
      - smtp_password
    labels:
      - "traefik.enable=false"
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    networks:
      - daycare_ext
    logging:
      driver: syslog
      options:
        tag: "daycare"
 
  signal-cli-rest-api:
    container_name: signal-cli-rest-api
    image: bbernhard/signal-cli-rest-api:latest
    hostname: signal-cli-rest-api
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      - MODE=native
      - AUTO_RECEIVE_SCHEDULE=0 9 * * *
    volumes:
      - ./container/signal_cli_rest_api/data:/home/.local/share/signal-cli
    labels:
      - "traefik.enable=false"
    ports:
      - 8080:8080
    healthcheck:
      test: curl -sf http://localhost:8080/v1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    networks:
      - daycare_ext
    logging:
      driver: syslog
      options:
        tag: "signal-cli-rest-api"

  radicale:
    image: tomsquest/docker-radicale:latest
    container_name: radicale
    restart: unless-stopped
    depends_on:
      - traefik
    volumes:
      - ./container/radicale/data:/data
      - ./container/radicale/config:/config:ro
    expose:
      - "5232"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radicale.rule=Host(`CHANGE-ME-FQDN`) || Host(`CHANGE-ME-IP`)"
      - "traefik.http.routers.radicale.entrypoints=radicale"
      - "traefik.http.routers.radicale.tls=true"
      - "traefik.http.services.radicale.loadbalancer.server.port=5232"
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    healthcheck:
      test: curl -f http://127.0.0.1:5232 || exit 1
      interval: 30s
      retries: 3
    networks:
      - daycare_ext
    logging:
      driver: syslog
      options:
        tag: "radicale"

  dashboard:
    image: nginx:alpine
    container_name: dashboard
    hostname: dashboard
    restart: unless-stopped
    volumes:
      - ./container/nginx/data:/usr/share/nginx/html:ro
      - ./container/nginx/config/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./container/daycare/data:/data:ro
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`CHANGE-ME-FQDN`) || Host(`CHANGE-ME-IP`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 64M
          pids: 20
    networks:
      - daycare_ext
    logging:
      driver: syslog
      options:
        tag: "daycare-dashboard"

secrets:
  radicale_password:
    file: ./container/secrets/calendar_password
  smtp_password:
    file: ./container/secrets/smtp_password

networks:
  daycare_ext:
